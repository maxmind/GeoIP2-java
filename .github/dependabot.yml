version: 2
updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '14:00'
    open-pull-requests-limit: 10
    groups:
      jackson:
        patterns:
          - com.fasterxml.jackson*
    cooldown:
      default-days: 7
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '14:00'
    groups:
      codeql:
        patterns:
          - github/codeql-action*
    cooldown:
      default-days: 7
